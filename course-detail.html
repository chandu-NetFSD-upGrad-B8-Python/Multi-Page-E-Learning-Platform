<!DOCTYPE html>
<html>
<head>
<title>Course Detail</title>

<link rel="stylesheet" href="css/styles.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="main">

<h2 id="title"></h2>

<h4>Lessons</h4>
<ol id="lessons"></ol>

<h4>Section 1</h4>
<p>Basic concepts explained clearly.</p>

<h4>Section 2</h4>
<p>Advanced concepts and interview prep.</p>

<button class="btn btn-success mt-3" onclick="complete()">Mark Completed</button>

</div>

<script src="js/data.js"></script>

<script>


/* GET COURSE */
const id = new URLSearchParams(window.location.search).get("id");
const course = courses.find(c=>c.id==id);

/* LOAD */
document.getElementById("title").innerText = course.title;

course.lessons.forEach(l=>{
document.getElementById("lessons").innerHTML += `<li>${l}</li>`;
});

 if(!course){
  alert("Invalid course!");
  window.location.href = "courses.html";
}

/* COMPLETE COURSE */
function complete(){

let user = JSON.parse(localStorage.getItem("user")) || {};

if(!user.completedCourses) user.completedCourses = [];
if(!user.points) user.points = 0;

/* PREVENT DUPLICATE */
if(user.completedCourses.includes(course.title)){
  alert("Already completed!");
  return;
}

/* ADD DATA */
user.completedCourses.push(course.title);
user.points += 10;

/* PRACTICE TRACK */
let today = new Date().toISOString().split("T")[0];
let practice = JSON.parse(localStorage.getItem("practiceDates")) || [];

if(!practice.includes(today)){
  practice.push(today);
  localStorage.setItem("practiceDates", JSON.stringify(practice));
}

localStorage.setItem("user", JSON.stringify(user));

alert("Course Completed! +10 points");

/* REDIRECT */
window.location.href = "index.html";
}

</script>

</body>
</html>
